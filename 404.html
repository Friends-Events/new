<!DOCTYPE html>
<html lang="de-DE">
<head>
  <meta charset="UTF-8">
  <title>Friends Events Magdeburg</title>
  <script>
    // GitHub Pages SPA Redirect
    // Leitet alle 404-URLs zurück zur index.html und übergibt den Pfad als Hash
    (function(){
      var segmentCount = 0; // 0 = Root-Domain (friends-events.com), 1 = falls in Unterordner
      var l = window.location;
      var path = l.pathname.slice(1); // z.B. "unsere-angebote" oder "ueber-uns"

      // Mapping alter Wix-URLs auf neue Hash-Anker
      var redirectMap = {
        'unsere-angebote':    '#angebote',
        'angebote':           '#angebote',
        'huepfburg':          '#huepfburgen',
        'huepfburgen':        '#huepfburgen',
        'fussball-dart':      '#fussball-dart',
        'fussdart':           '#fussball-dart',
        'fotospiegel':        '#fotospiegel',
        'kinderunterhaltung': '#kinderunterhaltung',
        'kinder':             '#kinderunterhaltung',
        'food-specials':      '#food-specials',
        'zucker':             '#food-specials',
        'kombipakete':        '#kombipakete',
        'ueber-uns':          '#ueber-uns',
        'about':              '#ueber-uns',
        'so-funktionierts':   '#so-funktionierts',
        'howto':              '#so-funktionierts',
        'faq':                '#faq',
        'kontakt':            '#kontakt',
        'impressum':          '#impressum',
        'agb':                '#agb',
        'datenschutz':        '#datenschutz'
      };

      // Pfad bereinigen (führende/trailing Slashes entfernen)
      var cleanPath = path.replace(/^\/+|\/+$/g, '').split('/')[0].toLowerCase();
      var hash = redirectMap[cleanPath] || '';

      // Weiterleitung zur Startseite mit passendem Hash
      l.replace(
        l.protocol + '//' + l.hostname +
        (l.port ? ':' + l.port : '') +
        '/' +
        (hash ? hash : '')
      );
    })();
  </script>
</head>
<body>
  <p>Weiterleitung zu Friends Events Magdeburg…</p>
</body>
</html>
